apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers
spec:
  template:
    spec:
      tolerations:
      - key: workloadType
        operator: Equal
        value: worker-pool
      nodeSelector:
        workloadType: worker-pool
      containers:
      - name: worker-private
        env:
          - name: GOOGLE_CLOUD_PROJECT
            value: oss-vdb-test
          - name: OSV_VULNERABILITIES_BUCKET
            value: osv-test-vulnerabilities
        resources:
          requests:
            cpu: 14
            memory: "10G"
          limits:
            cpu: 16
            memory: "13G"