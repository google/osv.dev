apiVersion: apps/v1
kind: Deployment
metadata:
  name: importer-reconciler
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: importer
            env:
            - name: GOOGLE_CLOUD_PROJECT
              value: oss-vdb-test
            - name: OSV_VULNERABILITIES_BUCKET
              value: osv-test-vulnerabilities
            args: ["--reconcile=true"]
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: importer-reconciler-git-cache-pv
spec:
  csi:
    driver: pd.csi.storage.gke.io
    volumeHandle: projects/oss-vdb-test/zones/us-central1-f/disks/importer-reconciler-git-cache
    fsType: ext4
