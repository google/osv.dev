syntax = "proto3";

package gitter;

option go_package = "./repository";

message CommitDetail {
    bytes hash = 1;
    bytes patch_id = 2;
}

// RepositoryCache contains only immutable information of a repository (commit hash and the associated patch ID)
// Other git-related structures such as refs and the actual graph are to be constructed when a request comes in.
message RepositoryCache {
    repeated CommitDetail commits = 1;
}

message AffectedCommit {
    bytes hash = 1;
    repeated string refs = 2;
}

message AffectedCommitsResponse {
    repeated AffectedCommit commits = 1;
}

enum EventType {
    INTRODUCED = 0;
    FIXED = 1;
    LAST_AFFECTED = 2;
    LIMIT = 3;
}

message Event {
    EventType event_type = 1;
    string hash = 2;
}

message CacheRequest {
    string url = 1;
    bool force_update = 2;
}

message AffectedCommitsRequest {
    string url = 1;
    repeated Event events = 2;
    bool detect_cherrypicks_introduced = 3;
    bool detect_cherrypicks_fixed = 4;
    bool force_update = 5;
}
