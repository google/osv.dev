apiVersion: batch/v1
kind: CronJob
metadata:
  name: importer-reconciler
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: importer
            env:
            - name: GOOGLE_CLOUD_PROJECT
              value: oss-vdb-test
            - name: DATASTORE_DATABASE_ID
              value: "datastore-private"
            - name: WORKER_TASK_TOPIC
              value: "private-tasks"
            # We don't have a dedicated reimport pool for this private deployment,
            # so route reimports to the default pool.
            - name: REIMPORT_TASK_POOL
              value: "default"
            args: ["--reconcile=true"]
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: importer-reconciler-git-cache-pv
spec:
  csi:
    driver: pd.csi.storage.gke.io
    volumeHandle: projects/oss-vdb-test/zones/us-central1-f/disks/importer-reconciler-git-cache-private
    fsType: ext4
