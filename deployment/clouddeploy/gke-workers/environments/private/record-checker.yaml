apiVersion: batch/v1
kind: CronJob
metadata:
  name: record-checker
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: record-checker
            env:
            - name: GOOGLE_CLOUD_PROJECT
              value: private-osv
            - name: OSV_VULNERABILITIES_BUCKET
              value: private-osv-vulnerabilities
            - name: FAILED_TASKS_TOPIC
              value: "failed-osv-work"
