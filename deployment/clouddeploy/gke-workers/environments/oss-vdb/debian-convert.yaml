apiVersion: batch/v1
kind: CronJob
metadata:
  name: debian-convert
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: debian-convert
            env:
            - name: GOOGLE_CLOUD_PROJECT
              value: oss-vdb
            - name: OUTPUT_GCS_BUCKET
              value: debian-osv
            args:
            - "--upload-to-gcs"
            - "--output-bucket=$(OUTPUT_GCS_BUCKET)"
