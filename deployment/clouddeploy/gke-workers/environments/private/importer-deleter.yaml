apiVersion: batch/v1
kind: CronJob
metadata:
  name: importer-deleter
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: importer-deleter
            env:
            - name: GOOGLE_CLOUD_PROJECT
              value: oss-vdb-test
            - name: DATASTORE_DATABASE_ID
              value: "datastore-private"
            - name: WORKER_TASK_TOPIC
              value: "private-tasks"
            image: importer
            args:
              - --delete
              - --delete-threshold-pct=2
