name: Generate Protos

on:
  push:
    branches: [ master ]
    paths:
      - 'osv/osv-schema/proto/vulnerability.proto'
      - 'osv/importfinding.proto'
      - 'gcp/api/v1/osv_service_v1.proto'
  pull_request: 
  workflow_dispatch:

concurrency:
  # Pushing new changes to a branch will cancel any in-progress CI runs
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Restrict jobs in this workflow to have no permissions by default; permissions
# should be granted per job as needed using a dedicated `permissions` block
permissions: {}

jobs:
  generate:
    permissions:
      contents: write # to fetch and commit code
      actions: write # to manually dispatch checks on the pull request
      pull-requests: write # Create pull requests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install poetry
        run: pip install poetry==2.2.1

      - name: Set up poetry
        run: |
          poetry install
          cd gcp/api && poetry install

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Go proto plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Generate protos
        run: make build-protos

      - name: Verify no changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated proto files are out of sync. Please run 'make build-protos' locally and commit the changes."
            git diff
            exit 1
          fi
