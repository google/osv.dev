apiVersion: apps/v1
kind: Deployment
metadata:
  name: importer-reconciler
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: importer
            env:
            - name: GOOGLE_CLOUD_PROJECT
              value: oss-vdb
            - name: OSV_VULNERABILITIES_BUCKET
              value: osv-vulnerabilities
            args: ["--reconcile=true"]
