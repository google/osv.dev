apiVersion: batch/v1
kind: CronJob
metadata:
  name: vanir-signatures
  labels:
    cronLastSuccessfulTimeMins: "400"
spec:
  schedule: "0 */6 * * *"
  timeZone: "Australia/Sydney"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: vanir-signatures
            image: vanir-signatures
            imagePullPolicy: Always
            resources:
              requests:
                cpu: "1"
                memory: "10G"
              limits:
                cpu: "1"
                memory: "13G"
          restartPolicy: Never
