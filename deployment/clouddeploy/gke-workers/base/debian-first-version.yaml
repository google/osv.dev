apiVersion: batch/v1
kind: CronJob
metadata:
  name: debian-first-version
  labels:
    cronLastSuccessfulTimeMins: "2880"
spec:
  timeZone: "Australia/Sydney"
  schedule: "0 1 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      template:
        spec:
          containers:
          - name: debian-first-version
            image: run_first_package_finder
            imagePullPolicy: Always
            volumeMounts:
              - mountPath: "/work"
                name: "ssd"
            resources:
              requests:
                cpu: "1"
                memory: "1G"
              limits:
                cpu: "1"
                memory: "2G"
          restartPolicy: OnFailure
          volumes:
            - name: "ssd"
              hostPath:
                path: "/mnt/disks/ssd0"
