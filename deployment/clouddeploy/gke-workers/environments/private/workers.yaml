apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers
spec:
  template:
    spec:
      tolerations:
      - key: workloadType
        operator: Equal
        value: worker-pool
      nodeSelector:
        workloadType: worker-pool
      containers:
      - name: worker-private
        env:
          - name: GOOGLE_CLOUD_PROJECT
            value: private-osv
          - name: OSV_VULNERABILITIES_BUCKET
            value: private-osv-vulnerabilities
          - name: PUBSUB_SUBSCRIPTION
            value: "default-pool"
          - name: FAILED_TASKS_TOPIC
            value: "failed-osv-work"
        resources:
          requests:
            cpu: "0.9"
            memory: "1.2Gi"
          limits:
            cpu: "1.5"
            memory: "1.3Gi"