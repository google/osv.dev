apiVersion: apps/v1
kind: Deployment
metadata:
  name: recoverer
spec:
  template:
    spec:
      containers:
      - name: recoverer
        env:
          - name: GOOGLE_CLOUD_PROJECT
            value: private-osv
          - name: OSV_VULNERABILITIES_BUCKET
            value: private-osv-vulnerabilities
          - name: FAILED_TASKS_SUBSCRIPTION
            value: "recovery"
          - name: WORKER_TASK_TOPIC
            value: "osv-work"
