apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pubsub-reimport
spec:
  minReplicas: 0
  maxReplicas: 100
  metrics:
  - external:
      metric:
        name: pubsub.googleapis.com|subscription|num_undelivered_messages
        selector:
          matchLabels:
            resource.labels.subscription_id: reimport
      target:
        type: AverageValue
        averageValue: 10  # each worker can handle 10 tasks
    type: External
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workers-reimport
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 10
        periodSeconds: 300
      - type: Pods
        value: 20
        periodSeconds: 300
      selectPolicy: Max
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers-reimport
spec:
  replicas: 0
  selector:
    matchLabels:
      name: workers-reimport
  template:
    metadata:
      labels:
        name: workers-reimport
    spec:
      containers:
      - name: workers-reimport
        image: worker
        imagePullPolicy: Always
        env:
          - name: GITTER_HOST
            value: http://gitter-service:8888
          - name: PUBSUB_SUBSCRIPTION
            value: reimport
          - name: DATASTORE_DATABASE_ID
            value: "" # default
          - name: FAILED_TASKS_TOPIC
            value: failed-tasks
          - name: NOTIFY_PYPI
            value: "false"
        resources:
          requests:
            cpu: "0.9"
            memory: "1.2Gi"
          limits:
            cpu: "1.5"
            memory: "1.3Gi"
