apiVersion: batch/v1
kind: CronJob
metadata:
  name: exporter
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: exporter
            env:
            - name: GOOGLE_CLOUD_PROJECT
              value: private-osv
            args:
              - "--upload-to-gcs=true"
              - "--workers=3000"
              - "--bucket=private-osv-vulnerabilities"
              - "--osv-vulns-bucket=private-osv-vulnerabilities"

