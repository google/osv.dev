apiVersion: batch/v1
kind: CronJob
metadata:
  name: vanir-signatures
  labels:
    cronLastSuccessfulTimeMins: "660"
spec:
  schedule: "0 */6 * * *"
  timeZone: "Australia/Sydney"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: vanir-signatures
            image: vanir-signatures
            imagePullPolicy: Always
            resources:
              requests:
                cpu: "4"
                memory: "63G"
              limits:
                cpu: "4"
                memory: "64G"
          nodeSelector:
            cloud.google.com/gke-nodepool: highend
          tolerations:
          - key: workloadType
            operator: Equal
            value: highend
          restartPolicy: Never
