apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: osv-website
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '1'
        run.googleapis.com/vpc-access-connector: projects/oss-vdb-test/locations/us-west2/connectors/connector
    spec:
      containers:
      - image: osv-website
        env:
        - name: OSV_VULNERABILITIES_BUCKET
          value: 'osv-test-vulnerabilities'
        - name: REDISHOST
          value: '10.189.34.180'
        - name: REDISPORT
          value: '6379'
        
        # --- Authentication Variables ---
        - name: GOOGLE_OAUTH_CLIENT_ID
          value: '175272184261-plkdbn2vea10d769llle6e965u8hupat.apps.googleusercontent.com'
        - name: GOOGLE_OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: google-oauth-client-secret
              key: 'latest'
        - name: FLASK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: flask-secret-key
              key: 'latest'
        startupProbe:
          httpGet:
            path: /healthz
        livenessProbe:
          httpGet:
            path: /healthz
        resources:
          limits:
            cpu: 1
            memory: 4Gi
